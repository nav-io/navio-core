# Reproducible build CI via Guix.
#
# Replaces the prior:
#   - .github/workflows/release.yml  (hosted-runner CMake build, unsigned, not
#     reproducible; only x86_64-linux-gnu + arm64-apple-darwin).
#   - .github/workflows/nightly-build.yml  (external navio-builder repo, daily
#     cron, separate from navio-core source).
# Both produced "an artifact" but neither was a reproducible build; both
# carried the warning "unsigned builder-built artifacts; not for production".
#
# Triggers:
#   - push to master       -> build + upload workflow-run artifacts;
#     navio-signer (external Rust daemon, separate repo) signs + publishes
#     the rolling "nightly" prerelease.
#   - push to a v* tag     -> build + upload workflow-run artifacts;
#     navio-signer signs + publishes the tagged GH release.
#   - workflow_dispatch    -> same as above; this workflow itself never
#     publishes to GitHub Releases (publication is gated by signer).
#
# Releases are signed out-of-band by navio-signer running on a maintainer-
# controlled mac with the codesigning keys:
#   - linux:   GPG detach-sign per-HOST tarballs + top-level SHA256SUMS
#   - mingw:   osslsigncode (Authenticode) each .exe / .dll
#   - darwin:  codesign (Developer ID) + xcrun notarytool
# See https://github.com/nav-io/navio-signer (TBD: transferring from
# mxaddict/navio-signer once stable).
#
# Guix is installed directly on the ubuntu-24.04 runner via the official
# binary install script (etc/guix-install.sh), as upstream Bitcoin Core's
# guix CI does — not inside a container. The actual build toolchain is
# pinned by the guix time-machine commit in contrib/guix/libexec/prelude.bash
# (independent of the runner's guix version), so the only requirement on the
# installed guix is a guile-gnutls that completes the substitute-server TLS
# handshake; the binary install provides one.
#
# `guix-build` uses `guix shell --container` for build isolation. Running guix
# on the host (rather than nested inside a docker container) gives that inner
# container a writable root, which build.sh requires (it creates /usr/bin).
# A nested docker-in-guix container left the inner root read-only under newer
# guix revisions, which is why an earlier debian-container approach was
# dropped.
#
# Scope:
#   The matrix below mirrors the full upstream-supported triple set
#   from contrib/guix/guix-build, plus aarch64-w64-mingw32. Long-tail
#   arches are listed commented-out so the diff to "build everything
#   upstream builds" is one-line-uncomment per arch when navio is ready
#   to ship them — instead of having to remember which triple was
#   already wired and which still needs depends / build.sh work.
#
#   Active:
#     - Linux:   x86_64, aarch64, arm (32-bit), riscv64,
#                powerpc64 (BE), powerpc64le (LE)
#     - Windows: x86_64-w64-mingw32
#     - macOS:   x86_64-apple-darwin, arm64-apple-darwin
#
#   Commented-out:
#     - Windows: aarch64-w64-mingw32 needs an llvm-mingw toolchain
#       (the depends + guix path is GCC-only and upstream GCC has no
#       mingw-w64 build for aarch64). Wiring it requires a separate
#       depends/hosts/mingw32.mk variant + a clang-based guix profile;
#       not a one-line uncomment.
#
#   Output shape: one ${DISTNAME}-${HOST}.tar.gz per HOST (or .zip on
#   mingw HOSTS). No .dmg / Bitcoin-Qt.app on macOS — navio is
#   CLI-only — and no codesigning tarball anywhere yet. The macOS SDK
#   is fetched from the bitcoincore.org depends-sources mirror at the
#   pinned XCODE_VERSION / XCODE_BUILD_ID in depends/hosts/darwin.mk
#   and cached on the runner; SDK files themselves never end up in our
#   outputs per contrib/macdeploy/README.md. Codesigning can be wired
#   back via contrib/guix/guix-codesign + detached-sig-create.sh once
#   a navio signing key is in place. -debug.tar.gz output is pending
#   setup_split_debug_script.

name: Release (guix)

on:
  push:
    branches: [master]
    tags: ['v*']
  # Manual trigger so the workflow can be validated from a feature branch
  # before being relied on for master/tag builds. All triggers produce the
  # same workflow-run artifacts; navio-signer decides whether to publish a
  # release based on the ref (master -> nightly, v* -> tagged).
  workflow_dispatch:

# Only one build run at a time per ref so concurrent pushes don't compete
# for the depends cache or hosted-runner minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Guix build ${{ matrix.host }}
    runs-on: ubuntu-24.04
    # Cold cache: guix store fetch + depends + build can take 2-3 h per
    # HOST. Warm cache (depends): ~30-60 min. 360 min (6 h) is the
    # hosted-runner cap.
    timeout-minutes: 360

    env:
      # Pinned guix bootstrap binary (what guix-install.sh installs). The
      # bootstrap guix only runs `guix time-machine`, which pins the real build
      # guix, so its version is immaterial — pinning makes the tarball
      # cacheable and lets the install bypass the flaky ftpmirror redirector.
      GUIX_BOOTSTRAP_VERSION: '1.5.0'

    strategy:
      fail-fast: false
      matrix:
        # Production OS/arch combos active; long-tail upstream triples
        # are listed commented-out so adding them back is a one-line
        # uncomment. See header "Scope" for what each commented entry
        # needs before flipping on.
        host:
          - x86_64-linux-gnu
          - arm-linux-gnueabihf
          - aarch64-linux-gnu
          - riscv64-linux-gnu
          - powerpc64-linux-gnu
          - powerpc64le-linux-gnu
          - x86_64-w64-mingw32
          # - aarch64-w64-mingw32  # blocked: needs llvm-mingw (no GCC mingw for aarch64)
          - x86_64-apple-darwin
          - arm64-apple-darwin

    steps:
      - name: Free disk space
        # The guix store grows to 20-40 GB on cold runs. Reclaim ~25 GB by
        # purging GHA's preinstalled SDKs (dotnet, android, ghc, codeql,
        # boost) which guix does not need.
        run: |
          set -x
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost 2>/dev/null || true
          df -h /

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # git_head_version() in contrib/shell/git-utils.bash needs the
          # tag history to compute DISTNAME deterministically on tag pushes.
          fetch-depth: 0

      - name: Determine version (for output paths)
        id: version
        shell: bash
        run: |
          # CMake-derived release version. Passed to guix-build as FORCE_VERSION
          # below so guix bakes it straight into DISTNAME — the per-HOST outputs
          # come out named navio-${cmake_version}-${HOST}.{tar.gz,zip} (inner dir
          # navio-${cmake_version}/) with a matching, reproducible SHA256SUMS.part,
          # so no post-build repack is needed. Matches the external navio-builder
          # naming: MAJOR.MINOR.BUILD with an rcN suffix when CLIENT_VERSION_RC>0
          # (e.g. 0.1.0rc30).
          cv() { sed -nE "s/^[[:space:]]*set\([[:space:]]*$1[[:space:]]+\"?([^\" )]+)\"?.*/\1/p" CMakeLists.txt | head -n1; }
          vmaj=$(cv CLIENT_VERSION_MAJOR); vmin=$(cv CLIENT_VERSION_MINOR)
          vbld=$(cv CLIENT_VERSION_BUILD); vrc=$(cv CLIENT_VERSION_RC)
          cmake_version="${vmaj}.${vmin}.${vbld}"
          if [ "${vrc:-0}" -gt 0 ]; then cmake_version="${cmake_version}rc${vrc}"; fi
          echo "cmake_version=${cmake_version}" >> "$GITHUB_OUTPUT"

          # Pinned guix time-machine commit from prelude.bash. Used as the
          # cache key for the time-machine checkout so subsequent runs reuse
          # the fetched guix repo instead of re-cloning it from a mirror.
          guix_commit=$(grep -oE -- '--commit=[0-9a-f]{7,40}' contrib/guix/libexec/prelude.bash | head -1 | sed 's/--commit=//')
          echo "guix_commit=${guix_commit}" >> "$GITHUB_OUTPUT"

      - name: Cache guix time-machine checkout
        # GitHub runners are ephemeral, so without this every run re-clones the
        # guix repo via `guix time-machine`; under the concurrent load of all
        # matrix jobs that fetch flakes (mirror SSL errors / 504s). Caching the
        # checkout keyed on the pinned commit means only the first run after a
        # commit bump (or a cache eviction) actually hits the network; the
        # mirror-rotation retry loop in "Run guix build" covers that case.
        uses: actions/cache@v5
        with:
          path: ~/.cache/guix
          key: guix-timemachine-${{ steps.version.outputs.guix_commit }}

      - name: Enable unprivileged user namespaces
        # ubuntu-24.04 ships an AppArmor profile that restricts unprivileged
        # user namespaces host-wide. `guix shell --container` (used by
        # guix-build for build isolation) needs unprivileged userns; the
        # restriction makes it fail with
        # `mount: mount "none" on "/tmp/guix-directory.*": Permission denied`.
        # Disable the restriction so guix's container can be created.
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true

      - name: Cache depends SOURCES_PATH
        # Cache the raw source downloads (the bandwidth-heavy bit). Keyed on
        # depends/packages so adding a package busts the cache; lighter
        # depends/ edits still restore.
        uses: actions/cache@v5
        with:
          path: ~/depends-sources
          key: guix-sources-v2-${{ hashFiles('depends/packages/*.mk', 'depends/Makefile') }}
          restore-keys: |
            guix-sources-v2-

      - name: Cache depends BASE_CACHE
        # Cache the built depends prefixes per HOST (the CPU-heavy bit).
        # Keyed on depends/ and the manifest so a manifest bump or depends
        # change rebuilds.
        uses: actions/cache@v5
        with:
          path: ~/depends-cache
          key: guix-base-v2-${{ matrix.host }}-${{ hashFiles('depends/**', 'contrib/guix/manifest.scm') }}
          restore-keys: |
            guix-base-v2-${{ matrix.host }}-

      - name: Pin macOS SDK version (darwin HOSTS only)
        # Pulls XCODE_VERSION / XCODE_BUILD_ID out of depends/hosts/darwin.mk
        # so the cache key + fetch URL track the pinned SDK without
        # duplicating the version in this workflow.
        if: contains(matrix.host, 'darwin')
        id: sdk
        shell: bash
        run: |
          xcode_version=$(awk -F= '/^XCODE_VERSION=/{print $2; exit}' depends/hosts/darwin.mk)
          xcode_build_id=$(awk -F= '/^XCODE_BUILD_ID=/{print $2; exit}' depends/hosts/darwin.mk)
          sdk_name="Xcode-${xcode_version}-${xcode_build_id}-extracted-SDK-with-libcxx-headers"
          echo "name=${sdk_name}"      >> "$GITHUB_OUTPUT"
          echo "tarball=${sdk_name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Cache macOS SDK (darwin HOSTS only)
        if: contains(matrix.host, 'darwin')
        id: sdk-cache
        uses: actions/cache@v5
        with:
          # Sibling of $GITHUB_WORKSPACE so the path matches the SDK_PATH
          # env passed to guix-build below. Matches the depends-sources /
          # depends-cache pattern above.
          path: ${{ github.workspace }}/../sdk-path/${{ steps.sdk.outputs.name }}
          key: macos-sdk-${{ steps.sdk.outputs.name }}

      - name: Fetch macOS SDK from bitcoincore.org mirror (darwin HOSTS only)
        # Apple's Xcode XIP is not redistributable, but the extracted-SDK
        # tarball (~120 MB) is mirrored by bitcoincore.org with a known
        # SHA. The SDK contents do not end up in our final outputs (see
        # contrib/macdeploy/README.md — "the build process has been
        # designed to avoid including the SDK's files in Guix's outputs"),
        # so we fetch + extract into SDK_PATH purely as a build input.
        if: contains(matrix.host, 'darwin') && steps.sdk-cache.outputs.cache-hit != 'true'
        env:
          SDK_TARBALL: ${{ steps.sdk.outputs.tarball }}
          SDK_NAME: ${{ steps.sdk.outputs.name }}
        run: |
          sdk_dir="${GITHUB_WORKSPACE}/../sdk-path"
          mkdir -p "${sdk_dir}"
          cd "${sdk_dir}"
          curl --fail --location --retry 5 --retry-delay 30 \
            --output "${SDK_TARBALL}" \
            "https://bitcoincore.org/depends-sources/sdks/${SDK_TARBALL}"
          tar -xf "${SDK_TARBALL}"
          rm "${SDK_TARBALL}"
          test -d "${SDK_NAME}" || { echo "SDK extract produced no ${SDK_NAME} dir"; ls -la; exit 1; }

      - name: Cache guix bootstrap binary
        # Cache the guix bootstrap tarball (keyed on the pinned version) so the
        # install never re-downloads it from the flaky ftpmirror redirector.
        uses: actions/cache@v5
        with:
          path: ~/guix-bootstrap
          key: guix-binary-${{ env.GUIX_BOOTSTRAP_VERSION }}-x86_64-linux

      - name: Install guix
        # Install guix directly on the runner (not inside a container) via the
        # official binary install script. Running guix on the host — like
        # upstream Bitcoin Core's guix CI — means `guix shell --container`
        # (used by guix-build for isolation) gets a writable container root, so
        # build.sh's `mkdir -p /usr/bin` works. The newer guix time-machined
        # below makes that container root read-only when nested inside a docker
        # container, which is why the previous debian:sid container approach
        # broke. The script installs a guix whose guile-gnutls handles the
        # substitute-server TLS handshake (the issue that motivated the sid
        # container in the first place).
        run: |
          set -euo pipefail
          cd /tmp
          # Fetch guix-install.sh with per-mirror retries + fallback. A `push`/
          # tag fires all matrix jobs at once; a single source (savannah cgit)
          # intermittently returns 502/503 under that concurrent load, which
          # would fail every job. Try savannah, then the codeberg mirror of the
          # same repo. (The github guix-mirror is stale and its raw endpoint
          # 404s, so it is not used here.)
          INSTALLER_URLS=(
            "https://git.savannah.gnu.org/cgit/guix.git/plain/etc/guix-install.sh"
            "https://codeberg.org/guix/guix/raw/branch/master/etc/guix-install.sh"
          )
          fetched=0
          for url in "${INSTALLER_URLS[@]}"; do
            echo "Fetching guix-install.sh from ${url}"
            if wget -nv --tries=3 --waitretry=10 \
                 --retry-on-http-error=429,500,502,503,504 \
                 -O guix-install.sh "${url}"; then
              fetched=1
              break
            fi
            echo "Fetch from ${url} failed; trying next mirror..."
          done
          [ "${fetched}" -eq 1 ] || { echo "Could not fetch guix-install.sh from any mirror"; exit 1; }
          chmod +x guix-install.sh

          # guix-install.sh would otherwise download the guix binary release
          # from a hard-coded GNU_URL=ftpmirror.gnu.org with no retries, dying
          # on the first failure; that redirector intermittently 502s under the
          # concurrent load of all matrix jobs. Instead pre-fetch a pinned
          # bootstrap tarball ourselves (restored from cache on hits) and hand
          # it to the installer via GUIX_BINARY_FILE_NAME, which makes it skip
          # the download (and the gpg-key fetches) entirely.
          boot_dir="${HOME}/guix-bootstrap"
          tarball="guix-binary-${GUIX_BOOTSTRAP_VERSION}.x86_64-linux.tar.xz"
          mkdir -p "${boot_dir}"
          if [ -f "${boot_dir}/${tarball}" ] && xz -t "${boot_dir}/${tarball}" 2>/dev/null; then
            echo "Using cached ${tarball}"
          else
            rm -f "${boot_dir}/${tarball}"
            BIN_URLS=(
              "https://ftpmirror.gnu.org/gnu/guix/${tarball}"
              "https://ftp.gnu.org/gnu/guix/${tarball}"
            )
            got=0
            for url in "${BIN_URLS[@]}"; do
              echo "Fetching ${url}"
              if wget -nv --tries=5 --waitretry=15 \
                   --retry-on-http-error=429,500,502,503,504 \
                   -O "${boot_dir}/${tarball}" "${url}"; then
                got=1
                break
              fi
              echo "Fetch from ${url} failed; trying next mirror..."
            done
            [ "${got}" -eq 1 ] || { rm -f "${boot_dir}/${tarball}"; echo "Could not fetch ${tarball}"; exit 1; }
            xz -t "${boot_dir}/${tarball}" || { rm -f "${boot_dir}/${tarball}"; echo "Fetched ${tarball} is corrupt"; exit 1; }
          fi

          # Non-interactive: feed newlines to auto-accept the prompts. The
          # installer stops reading stdin once it finishes, which SIGPIPEs
          # `yes`; run the pipe with pipefail off so the pipeline reflects the
          # installer's exit status, not yes's broken pipe. GUIX_BINARY_FILE_NAME
          # (passed through sudo) points the root-run installer at our tarball.
          set +o pipefail
          yes '' | sudo GUIX_BINARY_FILE_NAME="${boot_dir}/${tarball}" bash ./guix-install.sh
          install_rc=$?
          set -o pipefail
          [ "$install_rc" -eq 0 ] || { echo "guix-install.sh failed"; exit 1; }
          sudo systemctl enable --now guix-daemon

          # Newer guix-install.sh installs an *unprivileged* guix-daemon: it
          # runs as the 'guix-daemon' user, is confined by an AppArmor profile,
          # and builds via user namespaces (no 'guixbuild' build-user pool).
          # That model fails our glibc-2.31 source-checkout on this runner —
          # the build process hits EACCES on /tmp and /etc inside its build
          # container (mkdtemp/git-init both "Permission denied") even though
          # the host paths are world-readable/writable. glibc-2.31 is a custom
          # package with no substitute, so it is the first derivation actually
          # built locally and the first to expose this. Reconfigure to the
          # traditional *privileged* daemon (root + dedicated build users +
          # chroot), the model upstream Bitcoin Core's guix CI relies on.
          sudo systemctl stop guix-daemon || true
          if ! getent group guixbuild >/dev/null; then
            sudo groupadd --system guixbuild
          fi
          for i in $(seq -w 1 10); do
            if ! id "guixbuilder${i}" >/dev/null 2>&1; then
              sudo useradd -g guixbuild -G guixbuild -d /var/empty \
                -s /usr/sbin/nologin -c "Guix build user ${i}" --system "guixbuilder${i}"
            fi
          done
          # The unprivileged install chowned state to guix-daemon. Reclaim
          # /var/guix (the daemon's mutable state) for root. Skip /gnu/store:
          # it is a read-only bind mount (gnu-store.mount), and a root daemon
          # reads/writes the store regardless of file ownership while build
          # users only need to read it (store paths are world-readable).
          sudo chown -R root:root /var/guix 2>/dev/null || true
          # Drop the AppArmor confinement meant for the unprivileged daemon.
          if [ -f /etc/apparmor.d/guix-daemon ]; then
            sudo apparmor_parser -R /etc/apparmor.d/guix-daemon 2>/dev/null || true
            sudo rm -f /etc/apparmor.d/guix-daemon
          fi
          # Override the systemd unit: clear User=/Group= (so it runs as root),
          # drop AppArmor, and run with --build-users-group=guixbuild. Keep
          # substitutes pointed at the build farms so most derivations download.
          sudo mkdir -p /etc/systemd/system/guix-daemon.service.d
          sudo tee /etc/systemd/system/guix-daemon.service.d/privileged.conf >/dev/null <<'EOF'
          [Service]
          User=
          Group=
          AppArmorProfile=
          ExecStart=
          ExecStart=/var/guix/profiles/per-user/root/current-guix/bin/guix-daemon --build-users-group=guixbuild --substitute-urls='https://bordeaux.guix.gnu.org https://ci.guix.gnu.org'
          EOF
          sudo systemctl daemon-reload
          sudo systemctl restart guix-daemon
          # Confirm it is now root + build-users (not User=guix-daemon).
          pgrep -af guix-daemon || true

          echo "/var/guix/profiles/per-user/root/current-guix/bin" >> "$GITHUB_PATH"
          /var/guix/profiles/per-user/root/current-guix/bin/guix --version

      - name: Run guix build
        env:
          HOSTS: ${{ matrix.host }}
          # darwin HOSTS need SDK_PATH pointing at the parent dir of the
          # extracted SDK; linux + mingw HOSTS ignore it. depends/hosts/
          # darwin.mk reads $(SDK_PATH)/Xcode-…-extracted-SDK-…/.
          SDK_PATH: ${{ contains(matrix.host, 'darwin') && format('{0}/../sdk-path', github.workspace) || '' }}
          # MAX_JOBS=2 keeps memory in budget on the 16 GB runner during the
          # parallel depends build.
          MAX_JOBS: '2'
          # prelude.bash reads FORCE_VERSION as VERSION (overriding
          # git_head_version), which sets DISTNAME=navio-${VERSION}. Pin it to
          # the CMake release version so guix emits navio-<version>-<HOST>
          # outputs natively — no post-build rename, SHA256SUMS.part stays valid
          # and reproducible, and navio-signer consumes the files as-is.
          FORCE_VERSION: ${{ steps.version.outputs.cmake_version }}
        run: |
          set -euo pipefail
          # Cache the depends source downloads + built prefixes under $HOME,
          # matching the `~/depends-*` paths of the actions/cache steps above
          # so the cache round-trips.
          export SOURCES_PATH="${HOME}/depends-sources"
          export BASE_CACHE="${HOME}/depends-cache"
          mkdir -p "${SOURCES_PATH}" "${BASE_CACHE}"

          # Skip the bundled Tor daemon (OpenSSL+zlib+tor) in release builds for
          # now; it is exercised by the dedicated "depends with Tor" CI job.
          # Drop this once Tor bundling is wired into the release artifacts.
          export NO_TOR=1

          cd "${GITHUB_WORKSPACE}"

          # guix time-machine clones the guix repo from a single git mirror
          # (prelude.bash pins codeberg). On a `push` all matrix jobs start at
          # once and hammer that mirror concurrently, which intermittently
          # SSL-fails / 504s. On a time-machine cache hit (see the cache step
          # above) no fetch happens; on a miss, rotate mirrors across retries
          # and back off so a single flaky mirror doesn't fail the build.
          # guix's --url is last-wins and ADDITIONAL_GUIX_TIMEMACHINE_FLAGS is
          # appended after prelude's --url, so this overrides it per attempt.
          # Retries also recover transient `guix substitute` hiccups; guix is
          # incremental (built derivations stay in /gnu/store, depends caches
          # survive), so each retry resumes where the last left off.
          MIRRORS=(
            "https://codeberg.org/guix/guix.git"
            "https://git.savannah.gnu.org/git/guix.git"
            "https://github.com/guix-mirror/guix.git"
          )
          # Per-job startup jitter so the 9 matrix jobs don't all fetch at the
          # same instant on the first attempt.
          sleep "$(( RANDOM % 45 ))"

          attempts=6
          for attempt in $(seq 1 "${attempts}"); do
            url="${MIRRORS[$(( (attempt - 1) % ${#MIRRORS[@]} ))]}"
            export ADDITIONAL_GUIX_TIMEMACHINE_FLAGS="--url=${url}"
            echo "::group::guix-build attempt ${attempt}/${attempts} (time-machine mirror: ${url})"
            if ./contrib/guix/guix-build; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            ./contrib/guix/guix-clean || true
            # Exponential-ish backoff with jitter; lets an overloaded mirror
            # recover and further de-syncs concurrent jobs.
            backoff=$(( 20 * attempt + RANDOM % 30 ))
            echo "guix-build attempt ${attempt} failed; sleeping ${backoff}s then retrying..."
            sleep "${backoff}"
          done
          echo "guix-build failed after ${attempts} attempts across mirrors"
          exit 1

      - name: Dump guix build logs on failure
        if: failure()
        run: |
          # The guix-daemon writes each derivation's build output to
          # /var/log/guix/drvs/<2 chars>/<hash>.drv.gz, which is not echoed to
          # the job log. Surface the recent ones (and any glibc/gcc/checkout
          # logs) so failures like a glibc-2.31 source-checkout are diagnosable.
          set +e
          echo "===== guix-daemon environment ====="
          echo "--- daemon ExecStart (chroot enabled?) ---"
          systemctl cat guix-daemon 2>/dev/null | grep -i execstart
          echo "--- daemon running cmdline ---"
          pgrep -af guix-daemon
          echo "--- /tmp perms ---"
          ls -ld /tmp
          echo "--- /etc/gitconfig perms ---"
          ls -l /etc/gitconfig 2>&1
          echo "--- build users group ---"
          getent group guixbuild
          echo "===== glibc / gcc / checkout derivation logs ====="
          sudo find /var/log/guix/drvs -name '*.gz' \( -name '*glibc*' -o -name '*gcc*' -o -name '*checkout*' \) -newermt '-2 hours' 2>/dev/null \
            | while read -r f; do echo "----- ${f} -----"; sudo zcat "$f" 2>/dev/null | tail -60; done
          echo "===== most recent derivation logs ====="
          sudo find /var/log/guix/drvs -name '*.gz' -newermt '-2 hours' -printf '%T@ %p\n' 2>/dev/null \
            | sort -rn | head -8 | cut -d' ' -f2- \
            | while read -r f; do echo "----- ${f} -----"; sudo zcat "$f" 2>/dev/null | tail -60; done

      - name: Collect output artifacts
        id: collect
        shell: bash
        run: |
          set -euxo pipefail
          # guix-build places per-HOST outputs under
          # ${PWD}/guix-build-${VERSION}/output/${HOST}/. With FORCE_VERSION set
          # above, VERSION is the CMake release version, so the files are already
          # named navio-${VERSION}-${HOST}.{tar.gz,zip} with a matching
          # SHA256SUMS.part. Upload them verbatim — no repack — so the reproducible
          # hashes and the SHA256SUMS.part manifest stay valid for navio-signer's
          # verify step, which downloads them directly under the correct names.
          out_dir=$(echo guix-build-*/output/${{ matrix.host }})
          test -d "${out_dir}" || { echo "Missing output dir: ${out_dir}"; ls -la guix-build-*/output/ 2>/dev/null; exit 1; }
          mkdir -p "${RUNNER_TEMP}/artifacts"
          cp -av "${out_dir}/." "${RUNNER_TEMP}/artifacts/"
          ls -la "${RUNNER_TEMP}/artifacts/"

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guix-${{ steps.version.outputs.cmake_version }}-${{ matrix.host }}
          path: ${{ runner.temp }}/artifacts/*
          if-no-files-found: error

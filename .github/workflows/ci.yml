name: CI
on:
  # See: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#pull_request.
  pull_request:
    branches: [master]
  # See: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#push.
  push:
    branches: [master]

concurrency:
  group:
    ${{ github.event_name != 'pull_request' && github.run_id || github.ref }}
  cancel-in-progress: true

env:
  CI_FAILFAST_TEST_LEAVE_DANGLING: 1 # GHA does not care about dangling processes and setting this variable avoids killing the CI script itself on error

jobs:
  lint:
    name: '[lint]'
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare cache directories
        run: |
          sudo mkdir -p /python_build /lint_test_runner
          sudo chown "$USER:$USER" /python_build /lint_test_runner

      - name: Cache Python build
        uses: actions/cache@v5
        with:
          path: /python_build
          key: lint-python-${{ runner.os }}-${{ hashFiles('.python-version') }}

      - name: Cache lint test runner
        uses: actions/cache@v5
        with:
          path: /lint_test_runner
          key:
            lint-runner-${{ runner.os }}-${{
            hashFiles('test/lint/test_runner/**') }}

      - name: Run lint
        env:
          # 06_script.sh uses CIRRUS_PR to gate per-commit checks on PRs
          CIRRUS_PR: ${{ github.event.pull_request.number }}
        run: ./ci/lint_run_all.sh

  test-each-commit:
    name: '[commits]'
    runs-on: ubuntu-24.04
    if:
      github.event_name == 'pull_request' && github.event.pull_request.commits
      != 1
    timeout-minutes: 360 # Use maximum time, see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idtimeout-minutes. Assuming a worst case time of 1 hour per commit, this leads to a --max-count=6 below.
    env:
      MAX_COUNT: 6
    steps:
      - name: Determine fetch depth
        run:
          echo "FETCH_DEPTH=$((${{ github.event.pull_request.commits }} + 2))"
          >> "$GITHUB_ENV"
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: ${{ env.FETCH_DEPTH }}
      - name: Determine commit range
        run: |
          # Checkout HEAD~ and find the test base commit
          # Checkout HEAD~ because it would be wasteful to rerun tests on the PR
          # head commit that are already run by other jobs.
          git checkout HEAD~
          # Figure out test base commit by listing ancestors of HEAD, excluding
          # ancestors of the most recent merge commit, limiting the list to the
          # newest MAX_COUNT ancestors, ordering it from oldest to newest, and
          # taking the first one.
          #
          # If the branch contains up to MAX_COUNT ancestor commits after the
          # most recent merge commit, all of those commits will be tested. If it
          # contains more, only the most recent MAX_COUNT commits will be
          # tested.
          #
          # In the command below, the ^@ suffix is used to refer to all parents
          # of the merge commit as described in:
          # https://git-scm.com/docs/git-rev-parse#_other_rev_parent_shorthand_notations
          # and the ^ prefix is used to exclude these parents and all their
          # ancestors from the rev-list output as described in:
          # https://git-scm.com/docs/git-rev-list
          echo "TEST_BASE=$(git rev-list -n$((${{ env.MAX_COUNT }} + 1)) --reverse HEAD ^$(git rev-list -n1 --merges HEAD)^@ | head -1)" >> "$GITHUB_ENV"
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang ccache cmake ninja-build pkgconf python3-zmq libevent-dev \
            libboost-dev libsqlite3-dev libzmq3-dev systemtap-sdt-dev
      - name: Compile and run tests
        env:
          CC: clang
          CXX: clang++
          CCACHE_MAXSIZE: '2G'
        run: |
          # Run tests on the commit checked out above (HEAD~). The
          # git-rebase-per-commit iteration was previously commented out
          # in this job; preserved as-is — migrate the build chain only.
          # mempool_limit excluded because eviction timing fails under 2x
          # parallelism here, same reason Win64 native excludes it.
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_ZMQ=ON \
            -DWITH_USDT=ON
          cmake --build build -j"$(nproc)"
          ci/smoke_test_binaries.sh build
          ctest --test-dir build -j"$(nproc)" --output-on-failure
          build/test/functional/test_runner.py -j "$(( $(nproc) * 2 ))" \
            --ci --quiet --tmpdirprefix="${RUNNER_TEMP}" \
            --combinedlogslen=99999999 \
            --exclude mempool_limit

  macos-native-arm64:
    name: 'macOS 15 native, arm64, no depends, sqlite only (CMake)'
    # Use latest image, but hardcode version to avoid silent upgrades (and breaks).
    # See: https://github.com/actions/runner-images#available-images.
    runs-on: macos-15

    # No need to run on the read-only mirror, unless it is a PR.
    if:
      github.repository != 'navio-core/gui' || github.event_name ==
      'pull_request'

    timeout-minutes: 120

    env:
      CCACHE_MAXSIZE: '2G'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_16.4.app
          clang --version

      # Cache Homebrew's download / metadata directory so 'brew install'
      # skips the curl step on cache hit. The bottles themselves still get
      # linked into /opt/homebrew/Cellar each run, but that's seconds, not
      # the ~3-5min of cold network downloads from cold.
      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          # Key on the brew install line so a package list change busts
          # the cache. github.job pins to this job so other macOS jobs
          # don't collide if they're added later.
          key: ${{ github.job }}-brew-cmake-ninja-pkg-config-gnu-getopt-ccache-boost-libevent-zeromq-v1
          restore-keys: ${{ github.job }}-brew-

      - name: Install Homebrew packages
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
          # Skip the auto-update on every invocation; we trust the bottle
          # versions the runner image ships with.
          HOMEBREW_NO_AUTO_UPDATE: 1
        # Drop autotools toolchain (automake/libtool). Add cmake + ninja.
        run: |
          brew install cmake ninja pkg-config gnu-getopt ccache boost \
            libevent zeromq

      - name: Set Ccache directory
        run: echo "CCACHE_DIR=${RUNNER_TEMP}/ccache_dir" >> "$GITHUB_ENV"

      - name: Restore Ccache cache
        id: ccache-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ github.job }}-ccache-${{ github.run_id }}
          restore-keys: ${{ github.job }}-ccache-

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DREDUCE_EXPORTS=ON \
            -DWITH_ZMQ=ON

      - name: Build
        run: cmake --build build -j"$(sysctl -n hw.ncpu)"

      - name: Smoke test binaries
        # Reproduces aguycalled's macOS rpath regression class: catches
        # dyld load failures (`@rpath/libevent_pthreads-*.dylib not loaded`,
        # missing LC_RPATH) that ctest masks because it only execs
        # test_navio, not the production binaries.
        run: ci/smoke_test_binaries.sh build

      - name: Run unit tests
        working-directory: build
        run: ctest -j"$(sysctl -n hw.ncpu)" --output-on-failure

      - name: Save Ccache cache
        uses: actions/cache/save@v5
        if:
          github.event_name != 'pull_request' &&
          github.ref_name == github.event.repository.default_branch &&
          steps.ccache-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ env.CCACHE_DIR }}
          # https://github.com/actions/cache/blob/main/tips-and-workarounds.md#update-a-cache
          key: ${{ github.job }}-ccache-${{ github.run_id }}

  win64-native:
    name: 'Win64 native, VS 2022 (CMake)'
    # Use latest image, but hardcode version to avoid silent upgrades (and breaks).
    # See: https://github.com/actions/runner-images#available-images.
    runs-on: windows-2022

    # No need to run on the read-only mirror, unless it is a PR.
    if:
      github.repository != 'navio-core/gui' || github.event_name ==
      'pull_request'

    env:
      PYTHONUTF8: 1
      TEST_RUNNER_TIMEOUT_FACTOR: 40
      # Vcpkg manifest still lives under build_msvc/ from the legacy MSBuild
      # layout; point CMake at it without moving the file.
      VCPKG_MANIFEST_DIR: ${{ github.workspace }}/build_msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Developer Command Prompt for Microsoft Visual C++
        # Sets up cl.exe / link.exe / VCToolsVersion in PATH for CMake.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Tool versions
        run: |
          cmake --version
          ninja --version
          msbuild -version | Out-File -FilePath "$env:GITHUB_WORKSPACE\msbuild_version"
          $env:VCToolsVersion | Out-File -FilePath "$env:GITHUB_WORKSPACE\toolset_version"

      - name: Refresh vcpkg
        run: |
          # Runner image's local C:\vcpkg clone lags master; fetch so the
          # builtin-baseline commit pinned in build_msvc/vcpkg.json is reachable.
          Set-Location "$env:VCPKG_INSTALLATION_ROOT"
          git fetch --no-tags origin master
          Add-Content -Path "triplets\x64-windows-static.cmake" -Value "set(VCPKG_BUILD_TYPE release)"
          Add-Content -Path "triplets\x64-windows-static.cmake" -Value "set(VCPKG_PLATFORM_TOOLSET_VERSION $env:VCToolsVersion)"

      - name: Restore vcpkg downloads cache
        id: vcpkg-downloads-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            C:/vcpkg/downloads
            !C:/vcpkg/downloads/tools
          key: ${{ github.job }}-vcpkg-downloads-${{ hashFiles('build_msvc/vcpkg.json') }}

      - name: vcpkg tools cache
        uses: actions/cache@v5
        with:
          path: C:/vcpkg/downloads/tools
          key: ${{ github.job }}-vcpkg-tools

      - name: Restore vcpkg binary cache
        id: vcpkg-binary-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/AppData/Local/vcpkg/archives
          key:
            ${{ github.job }}-vcpkg-binary-${{ hashFiles('msbuild_version',
            'toolset_version', 'build_msvc/vcpkg.json') }}

      - name: Configure (CMake)
        shell: cmd
        run: |
          cmake -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-static ^
            -DVCPKG_MANIFEST_DIR=%VCPKG_MANIFEST_DIR% ^
            -DBUILD_TESTS=ON ^
            -DBUILD_BENCH=ON

      - name: Build
        shell: cmd
        run: cmake --build build --config Release

      - name: Smoke test binaries
        shell: bash
        run: ci/smoke_test_binaries.sh build

      - name: Save vcpkg binary cache
        uses: actions/cache/save@v5
        if: steps.vcpkg-binary-cache.outputs.cache-hit != 'true'
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: ${{ steps.vcpkg-binary-cache.outputs.cache-primary-key }}

      - name: Save vcpkg downloads cache
        uses: actions/cache/save@v5
        if: steps.vcpkg-downloads-cache.outputs.cache-hit != 'true'
        with:
          path: |
            C:/vcpkg/downloads
            !C:/vcpkg/downloads/tools
          key: ${{ steps.vcpkg-downloads-cache.outputs.cache-primary-key }}

      - name: Run unit tests
        run: build\bin\test_navio.exe -l test_suite

      - name: Run benchmarks
        # WalletLoadingDescriptors is skipped: the bench exercises a
        # navio-specific BLSCT mnemonic-entropy read path that raises
        # an ios_base::failure during DataStream::read under the
        # x64-windows-static CMake build (does not reproduce on the
        # autotools/MSBuild build). The underlying loader bug is
        # independent of the MSBuild → CMake migration this PR is
        # about, and is tracked separately. Native Win64 + every
        # non-Windows matrix entry still runs every other bench, so
        # bench coverage is otherwise intact.
        shell: pwsh
        run: |
          & build\bin\bench_navio.exe -sanity-check '-filter=^(?!WalletLoadingDescriptors$).+$'

      - name: Run util tests
        run: py -3 build\test\util\test_runner.py

      - name: Run rpcauth test
        run: py -3 build\test\util\rpcauth-test.py

      - name: Run functional tests
        env:
          TEST_RUNNER_EXTRA:
            ${{ github.event_name != 'pull_request' && '--extended' || '' }}
        run:
          py -3 build\test\functional\test_runner.py --jobs $env:NUMBER_OF_PROCESSORS
          --ci --quiet --tmpdirprefix=$env:RUNNER_TEMP
          --combinedlogslen=99999999
          --timeout-factor=$env:TEST_RUNNER_TIMEOUT_FACTOR
          $env:TEST_RUNNER_EXTRA --exclude mempool_limit
  # Autotools `linux:` matrix job removed: with arm/tsan/msan/i686-centos
  # all migrated to CMake (#250, #251, #252, #253), no autotools matrix
  # entries remain. The `previous-releases` stub was commented out and
  # never enabled. Restore from git history if a non-CMake linux scenario
  # ever needs to come back.

  # CMake-driven matrix. Mirrors the structure of the autotools `linux:` matrix
  # so scenarios can be added by appending one entry. Each entry supplies its
  # own apt packages, compiler, CMake flags, and smoke-test commands; the
  # surrounding steps (checkout, install, configure, build, install, test,
  # ccache) are shared. As more scenarios are migrated off autotools they get
  # added here.
  linux-cmake:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    # container is only set for entries that supply matrix.container.
    # When the field is absent the expression evaluates to empty string,
    # which GitHub Actions treats as "no container", so entries without
    # a matrix.container value keep running on the bare ubuntu runner.
    # mac-cross uses mirror.gcr.io/debian:trixie to pick up clang 19 (the
    # darwin.mk toolchain refresh needs newer clang than Ubuntu 24.04's
    # default clang 18 — same image upstream bitcoin uses for its
    # mac-cross job; see contrib/ci/test/00_setup_env_mac_cross.sh
    # upstream).
    container: ${{ matrix.container }}
    # 180 min matches the autotools `linux:` job above. The fuzz matrix
    # entry (#233) regularly takes 45-70 min wall-clock between build and
    # harness run, which overruns a 60 min budget; every other matrix
    # entry finishes well under 60 min, so the higher ceiling only costs
    # us in pathological hangs.
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        include:
          # Replaces the autotools `tidy` matrix entry.
          # Wallet and test code are included — tidy analyses all translation units.
          # CMAKE_BUILD_TYPE=None avoids build-type CFLAGS; -O0 -g0 are supplied
          # explicitly via APPEND_CXXFLAGS (mirrors autotools CXXFLAGS='-O0 -g0').
          # APPEND_CPPFLAGS adds the clang resource-dir include (matches
          # the autotools -I/usr/lib/llvm-17/lib/clang/17/include flag).
          # There is no ENABLE_HARDENING option in the CMake build system;
          # hardening flags are not added by default, matching --disable-hardening.
          - name: tidy
            label: '[tidy] Ubuntu 24.04, clang-17 (CMake)'
            runner: ubuntu-24.04
            packages: >-
              clang-17 libclang-17-dev llvm-17-dev libomp-17-dev
              clang-tidy-17 iwyu jq libevent-dev libboost-dev
              libminiupnpc-dev libnatpmp-dev libzmq3-dev
              systemtap-sdt-dev libsqlite3-dev
            cc: clang-17
            cxx: clang++-17
            cmake_flags: >-
              -DCMAKE_BUILD_TYPE=None
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
              -DAPPEND_CPPFLAGS=-I/usr/lib/llvm-17/lib/clang/17/include
              "-DAPPEND_CXXFLAGS=-O0 -g0"
            tidy: true
            smoke_test_binaries: true

          # Replaces the autotools `no-wallet-libblsct` matrix entry.
          # clang-13 (Bullseye default) is not packaged for Ubuntu 24.04 apt;
          # clang-14 (available via llvm-toolchain-jammy-14) is the closest
          # upstream-supported equivalent and produces identical ABI results.
          # -stdlib=libc++ mirrors DEP_OPTS="CXX='clang++-13 -stdlib=libc++'"
          # in 00_setup_env_native_libblsct_only.sh.
          # NO_OPENMP=1 → -DWITH_MCL_OPENMP=OFF (already the default; explicit).
          # NO_WALLET=1 → implied by BUILD_LIBBLSCT_ONLY=ON.
          - name: no-wallet-libblsct
            label: 'Ubuntu 24.04, no wallet, libblsct only (CMake)'
            runner: ubuntu-24.04
            packages: >-
              clang-14 llvm-14 libc++abi-14-dev libc++-14-dev
            cc: clang-14
            cxx: clang++-14
            cmake_flags: >-
              -DCMAKE_BUILD_TYPE=Release
              -DCMAKE_CXX_FLAGS=-stdlib=libc++
              -DCMAKE_EXE_LINKER_FLAGS=-stdlib=libc++
              -DCMAKE_SHARED_LINKER_FLAGS=-stdlib=libc++
              -DBUILD_LIBBLSCT_ONLY=ON
              -DWITH_MCL_OPENMP=OFF
            check_libblsct_symbols: true

          # Replaces the autotools `i686-multiprocess` matrix entry.
          # 32-bit Linux cross via depends, MULTIPROCESS=1 DEBUG=1.
          # Gap 3 (OBJCXX detection on Linux) was cleared in #228, so the
          # depends toolchain.cmake no longer trips on missing cc1obj.
          # Host packages: clang/llvm for the compiler driver, g++-multilib
          # for the 32-bit ABI bring-up (matches 00_setup_env_i686_multiprocess.sh).
          # gobjc++ is needed because GMP's autoconf in depends probes for
          # ObjC/ObjC++ support; without it gcc reports "cannot execute 'cc1obj'"
          # and GMP's configure aborts with "could not find a working compiler".
          # Functional tests are intentionally skipped: they require the
          # navio-node IPC daemon executable (upstream `bitcoin-node`),
          # which depends on a CMake-side ENABLE_IPC + navio_ipc library
          # wiring that navio does not yet have. Unit tests still exercise
          # the 32-bit Debug build with depends MULTIPROCESS=1.
          - name: i686-multiprocess
            label: 'Ubuntu 24.04, 32-bit, multiprocess, DEBUG, unit tests only (CMake)'
            runner: ubuntu-24.04
            packages: >-
              llvm clang g++-multilib gobjc++ python3-zmq
            cc: clang
            cxx: clang++
            depends_host: i686-pc-linux-gnu
            depends_opts: MULTIPROCESS=1 DEBUG=1 CC='clang -m32' CXX='clang++ -m32'
            cmake_flags: >-
              -DCMAKE_BUILD_TYPE=Debug
              -DWITH_MULTIPROCESS=ON
              "-DAPPEND_CPPFLAGS=-DBOOST_MULTI_INDEX_ENABLE_SAFE_MODE"
            run_unit_tests: true
            smoke_test_binaries: true

          # Replaces the autotools `win64` matrix entry.
          # MinGW cross via depends. Gap 1 (ZeroMQ pkg-config path) was
          # cleared in #227. Unit tests run under wine; functional tests
          # are skipped (matches the autotools job).
          # CMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/wine routes ctest's
          # execution of .exe binaries through wine without depending on
          # binfmt_misc (the noble GitHub runner doesn't auto-activate
          # wine-binfmt). The wine wrapper at /usr/bin/wine is provided
          # by the `wine` metapackage (wine-stable on noble) — the
          # wine64/wine32 packages on their own only install the per-bit
          # binaries under /usr/lib/wine/, with no /usr/bin/ wrapper.
          # i386 architecture is enabled to bring in wine32 alongside
          # wine64 so launching 64-bit Windows binaries pulls all the
          # transitive 32-bit runtime libs wine9 needs.
          - name: win64
            label: 'Win64 cross-compile, Ubuntu 24.04, unit tests only (CMake)'
            runner: ubuntu-24.04
            extra_arch: i386
            packages: >-
              g++-mingw-w64-x86-64-posix nsis wine wine64 wine32 file
              python3-zmq
            cc: gcc
            cxx: g++
            depends_host: x86_64-w64-mingw32
            cmake_flags: >-
              -DCMAKE_BUILD_TYPE=Release
              -DREDUCE_EXPORTS=ON
              -DCMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/wine
              "-DAPPEND_CXXFLAGS=-Wno-return-type"
            run_unit_tests: true
            smoke_test_binaries: true
            # system_tests/run_command expects a specific Win32 error code
            # for a non-existent command (6), but wine returns 2 instead —
            # this is a known wine-version-sensitive expectation. Skip the
            # whole system_tests target under wine; native Win64 (VS 2022)
            # still covers it.
            ctest_exclude: '^system_tests$'

          # Replaces the autotools `mac-cross` matrix entry.
          # Cross-compile to x86_64-apple-darwin via depends. Build only —
          # no unit/functional tests (matches autotools RUN_UNIT_TESTS=false
          # RUN_FUNCTIONAL_TESTS=false). The autotools job's GOAL=deploy is
          # a no-op in navio (no Qt/macOS bundle target); the CMake job
          # mirrors that by stopping at build.
          # The Xcode SDK is fetched from bitcoincore.org's mirror, matching
          # ci/test/01_base_install.sh's OSX_SDK_BASENAME logic.
          - name: mac-cross
            label: 'macOS cross-compile, debian:trixie, no tests (CMake)'
            runner: ubuntu-24.04
            # Debian trixie ships clang 19, matching the version guix
            # produces and the version upstream bitcoin tests with for
            # mac-cross. Ubuntu 24.04's default clang is 18, which is
            # too old: gmp's compile probe fails when configuring
            # darwin cross because clang 18 + lld 18 don't handle the
            # depends/hosts/darwin.mk driver chain
            # (--target=x86_64-apple-darwin + -mlinker-version=711 +
            # -isysroot SDK + -fuse-ld=lld) cleanly enough for
            # configure to find a working compiler.
            container: 'mirror.gcr.io/debian:trixie'
            # clang + lld + llvm-* tools are required by depends/hosts/
            # darwin.mk (clang for $(clang_prog), lld for -fuse-ld=lld,
            # llvm-ar / llvm-nm / llvm-ranlib / llvm-strip / llvm-objcopy
            # / llvm-objdump for the darwin_* binutils). The toolchain
            # moved off the depends-managed native_llvm/cctools chain
            # when navio adopted upstream's modernized darwin guix path.
            packages: zip clang lld llvm
            cc: gcc
            cxx: g++
            depends_host: x86_64-apple-darwin
            xcode_version: '15.0'
            xcode_build_id: '15A240d'
            cmake_flags: >-
              -DCMAKE_BUILD_TYPE=Release
              -DREDUCE_EXPORTS=ON
            # mac-cross produces Mach-O binaries on a Linux runner; no
            # emulator is wired so the smoke step falls back to `file`
            # shape probes (see ci/smoke_test_binaries.sh).
            smoke_test_binaries: true

          # Replaces the autotools `arm` matrix entry (00_setup_env_arm.sh).
          # 32-bit ARM hard-float cross via depends (arm-linux-gnueabihf).
          # Runner: ubuntu-24.04-arm (aarch64 host). No CMAKE_CROSSCOMPILING_EMULATOR
          # needed — the Linux aarch64 kernel exposes the 32-bit ARM
          # personality so armhf binaries run natively on the aarch64 host.
          # -DREDUCE_EXPORTS=ON mirrors --enable-reduce-exports from BITCOIN_CONFIG.
          # -DAPPEND_CXXFLAGS=-Wno-psabi mirrors CXXFLAGS=-Wno-psabi, silencing
          # ABI-change notes for parameter passing that changed in GCC 7.1.
          # busybox (USE_BUSY_BOX=true in the autotools job) was only used by
          # ci/test/03_test_script.sh to populate PATH with busybox symlinks for
          # functional-test helpers. Since RUN_FUNCTIONAL_TESTS=false the busybox
          # step was never exercised, and depends/funcs.mk + depends/Makefile have
          # zero busybox references, so no busybox install is needed here.
          - name: arm
            label: 'Ubuntu 24.04, ARM64 runner, 32-bit ARM cross-compile, unit tests only (CMake)'
            runner: ubuntu-24.04-arm
            extra_arch: armhf
            packages: >-
              g++-arm-linux-gnueabihf python3-zmq libc6:armhf libstdc++6:armhf
            cc: gcc
            cxx: g++
            depends_host: arm-linux-gnueabihf
            cmake_flags: >-
              -DCMAKE_BUILD_TYPE=Release
              -DREDUCE_EXPORTS=ON
              "-DAPPEND_CXXFLAGS=-Wno-psabi"
            run_unit_tests: true
            smoke_test_binaries: true

          # Replaces the `no-wallet-libnaviokernel` autotools matrix entry.
          # -stdlib=libc++ is passed via CMAKE_{CXX,EXE_LINKER}_FLAGS rather
          # than the CXX env var because cmake strips compiler flags out of
          # CXX when detecting the compiler, which would mean libstdc++/libc++
          # mixing in the bls/mcl subprojects.
          # Replaces the autotools `fuzz` matrix entry.
          # BUILD_FOR_FUZZING=ON enables fuzz binary and disables non-fuzz targets,
          # matching --enable-fuzz. SANITIZERS mirrors the autotools value.
          # -ftrivial-auto-var-init=pattern is added via APPEND_CXXFLAGS/CFLAGS.
          # Fuzz harness runs against the nav-io/qa-assets corpus with
          # --empty_min_time=60, matching ci/test/03_test_script.sh.
          - name: fuzz
            label: 'Ubuntu 24.04, fuzzer, ASan + UBSan + integer, no depends (CMake)'
            runner: ubuntu-24.04
            packages: >-
              clang-17 llvm-17 libclang-rt-17-dev libevent-dev libboost-dev
              libsqlite3-dev python3
            cc: clang-17
            cxx: clang++-17
            cmake_flags: >-
              -DBUILD_FOR_FUZZING=ON
              -DSANITIZERS=fuzzer,address,undefined,float-divide-by-zero,integer
              "-DAPPEND_CFLAGS=-ftrivial-auto-var-init=pattern"
              "-DAPPEND_CXXFLAGS=-ftrivial-auto-var-init=pattern"
            fuzz: true

          # Replaces the autotools `tsan` matrix entry
          # (ci/test/00_setup_env_native_tsan.sh).
          #
          # Uses depends with HOST=x86_64-pc-linux-gnu (native). Because host ==
          # build, toolchain.cmake sets crosscompiling=FALSE and does NOT set
          # CMAKE_SYSTEM_NAME, so CMake does not enter cross-compile mode. The
          # toolchain still wires up the depends-installed libraries and headers.
          #
          # depends_opts passes CC=clang-17 (mirrors DEP_OPTS CC=clang-17) and
          # NO_OPENMP=1 to skip building depends/libomp — OpenMP inside MCL
          # (parallel MSM) races with libomp in ways ThreadSanitizer flags as
          # false-positive data races; the TSan job intentionally runs
          # single-threaded through the BLSCT crypto path.
          #
          # -stdlib=libc++ is passed via CMAKE_CXX_FLAGS / CMAKE_EXE_LINKER_FLAGS
          # / CMAKE_SHARED_LINKER_FLAGS rather than through the CXX env var or
          # depends_opts CXX because CMake strips compiler flags out of CXX
          # during compiler detection (the same reason no-wallet-libblsct and
          # nowallet-libnaviokernel use this pattern). Passing it through DEP_OPTS
          # CXX would propagate it into depends package configure scripts, causing
          # libstdc++/libc++ mixing in the bls/mcl subprojects.
          #
          # autotools → CMake flag mapping:
          #   --with-sanitizers=thread → -DSANITIZERS=thread
          #   --disable-openmp         → -DWITH_MCL_OPENMP=OFF (also NO_OPENMP=1 in
          #                              depends_opts to skip the libomp port build)
          #   --enable-zmq             → -DWITH_ZMQ=ON
          #   CPPFLAGS=-DARENA_DEBUG -DDEBUG_LOCKORDER -DDEBUG_LOCKCONTENTION
          #                            → "-DAPPEND_CPPFLAGS=-DARENA_DEBUG
          #                               -DDEBUG_LOCKORDER -DDEBUG_LOCKCONTENTION"
          #   CXXFLAGS=-g              → "-DAPPEND_CXXFLAGS=-g"
          #   CXX='clang++-17 -stdlib=libc++' (DEP_OPTS)
          #                            → -DCMAKE_CXX_FLAGS=-stdlib=libc++
          #                               -DCMAKE_EXE_LINKER_FLAGS=-stdlib=libc++
          #                               -DCMAKE_SHARED_LINKER_FLAGS=-stdlib=libc++
          - name: tsan
            label: 'Ubuntu 24.04, ThreadSanitizer, depends (CMake)'
            runner: ubuntu-24.04
            packages: >-
              clang-17 llvm-17 libclang-rt-17-dev libc++abi-17-dev libc++-17-dev
              python3-zmq
            cc: clang-17
            cxx: clang++-17
            depends_host: x86_64-pc-linux-gnu
            depends_opts: CC=clang-17 CXX='clang++-17 -stdlib=libc++' NO_OPENMP=1
            cmake_flags: >-
              -DSANITIZERS=thread
              -DWITH_MCL_OPENMP=OFF
              -DWITH_ZMQ=ON
              "-DAPPEND_CPPFLAGS=-DARENA_DEBUG -DDEBUG_LOCKORDER -DDEBUG_LOCKCONTENTION"
              "-DAPPEND_CXXFLAGS=-g"
              -DCMAKE_CXX_FLAGS=-stdlib=libc++
              -DCMAKE_EXE_LINKER_FLAGS=-stdlib=libc++
              -DCMAKE_SHARED_LINKER_FLAGS=-stdlib=libc++
            smoke_test_binaries: true

          # Replaces the autotools `msan` matrix entry (removed from linux: above).
          # MSan requires that *every* memory operation — including the C++ standard
          # library — is instrumented. System libc++ is not instrumented, so we build
          # libc++/libc++abi from LLVM 17.0.2 source with -fsanitize=memory,origins
          # first, install to /msan/cxx_build/, then compile navio against it.
          # This mirrors ci/test/01_base_install.sh USE_MEMORY_SANITIZER block.
          #
          # Flag mapping from BITCOIN_CONFIG / MSAN_FLAGS:
          #   --with-sanitizers=memory  → -DSANITIZERS=memory (adds -fsanitize=memory
          #                               to compile and link via sanitize_interface)
          #   --disable-hardening       → no flag (CMake build has no hardening by
          #                               default; ENABLE_HARDENING option does not
          #                               exist — confirmed in CMakeLists.txt)
          #   --disable-openmp          → -DWITH_MCL_OPENMP=OFF (cmake/bls.cmake)
          #   --with-asm=no             → -DUSE_ASM=OFF (CMakeLists.txt line 118)
          #   MSAN_FLAGS extra bits      → APPEND_CFLAGS + EXTRA_CMAKE_FLAGS (blacklist)
          #   MSAN_AND_LIBCXX_FLAGS     → CMAKE_CXX_FLAGS + linker flags
          #
          # The -fsanitize-blacklist= flag needs an absolute source-tree path.
          # It cannot be embedded in the static cmake_flags matrix field because
          # GHA does not re-evaluate context expressions inside matrix values.
          # Instead a gated "Set MSan blacklist flag" step writes the flag into
          # EXTRA_CMAKE_FLAGS (read by the Configure step below).
          #
          # Inlined-chain suppression note: if CI reports use-of-uninitialized-value
          # in an inlined function where the fun: glob does not match (e.g. inlined
          # gmp/blsct helpers), add src: patterns to test/sanitizer_suppressions/msan
          # — see session memory "MSan suppression for inlined chains". Do not widen
          # suppressions pre-emptively; flag as known issue first.
          - name: msan
            label: 'Ubuntu 24.04, MemorySanitizer, depends (CMake)'
            runner: ubuntu-24.04
            packages: >-
              clang-17 llvm-17 libclang-rt-17-dev libc++abi-dev libc++-dev
              ninja-build python3
            cc: clang-17
            cxx: clang++-17
            # depends builds boost/libevent/gmp/sqlite3 against the instrumented
            # libc++ so every memory operation through them is tracked by MSan.
            # DEP_OPTS mirrors the autotools DEP_OPTS / MSAN_AND_LIBCXX_FLAGS set
            # in ci/test/00_setup_env_native_msan.sh. NO_OPENMP=1 matches
            # --disable-openmp. The -stdlib=libc++ on CXX routes depends'
            # C++ sources to the instrumented libc++ at /msan/cxx_build/.
            depends_host: x86_64-pc-linux-gnu
            depends_opts: >-
              CC=clang-17
              "CXX=clang++-17 -stdlib=libc++"
              "CFLAGS=-fsanitize=memory -fsanitize-memory-track-origins=2
              -fno-omit-frame-pointer -g -O1 -fno-optimize-sibling-calls"
              "CXXFLAGS=-fsanitize=memory -fsanitize-memory-track-origins=2
              -fno-omit-frame-pointer -g -O1 -fno-optimize-sibling-calls
              -nostdinc++ -nostdlib++
              -isystem /msan/cxx_build/include/c++/v1
              -L/msan/cxx_build/lib -Wl,-rpath,/msan/cxx_build/lib
              -lc++ -lc++abi -lpthread
              -Wno-unused-command-line-argument"
              NO_OPENMP=1
            # MSAN_AND_LIBCXX_FLAGS C++ side: full set passed to cmake so the
            # instrumented libc++ headers + rpath reach both compile and link lines.
            # APPEND_CFLAGS carries the non-sanitize extra MSan bits for C sources;
            # -fsanitize=memory itself comes via -DSANITIZERS=memory. The blacklist
            # path is appended by EXTRA_CMAKE_FLAGS (set in the gated step below).
            # APPEND_CFLAGS is supplied by the "Set MSan blacklist flag" step via a
            # cmake initial-cache file so the blacklist path can be an absolute
            # workspace path (not embeddable in a static matrix scalar field).
            cmake_flags: >-
              -DCMAKE_BUILD_TYPE=None
              -DSANITIZERS=memory
              -DUSE_ASM=OFF
              -DWITH_MCL_OPENMP=OFF
              "-DCMAKE_CXX_FLAGS=-fsanitize=memory -fsanitize-memory-track-origins=2 -fno-omit-frame-pointer -g -O1 -fno-optimize-sibling-calls -nostdinc++ -nostdlib++ -isystem /msan/cxx_build/include/c++/v1 -L/msan/cxx_build/lib -Wl,-rpath,/msan/cxx_build/lib -lc++ -lc++abi -lpthread -Wno-unused-command-line-argument"
              "-DCMAKE_EXE_LINKER_FLAGS=-L/msan/cxx_build/lib -Wl,-rpath,/msan/cxx_build/lib -lc++ -lc++abi -fsanitize=memory"
              "-DCMAKE_SHARED_LINKER_FLAGS=-L/msan/cxx_build/lib -Wl,-rpath,/msan/cxx_build/lib -lc++ -lc++abi -fsanitize=memory"
            msan: true
            run_unit_tests: true
            smoke_test_binaries: true

          - name: nowallet-libnaviokernel
            label: 'Ubuntu 22.04, no wallet, libnaviokernel (CMake)'
            runner: ubuntu-22.04
            packages: >-
              clang-14 llvm-14 libc++abi-14-dev libc++-14-dev
              libevent-dev libboost-dev python3-zmq
            cc: clang-14
            cxx: clang++-14
            cmake_flags: >-
              -DCMAKE_BUILD_TYPE=Release
              -DCMAKE_CXX_FLAGS=-stdlib=libc++
              -DCMAKE_EXE_LINKER_FLAGS=-stdlib=libc++
              -DCMAKE_SHARED_LINKER_FLAGS=-stdlib=libc++
              -DENABLE_WALLET=OFF
              -DREDUCE_EXPORTS=ON
              -DBUILD_UTIL_CHAINSTATE=ON
              -DBUILD_SHARED_LIBS=ON
              -DBUILD_TESTS=OFF
              -DBUILD_TX=ON
              -DBUILD_UTIL=ON
              -DENABLE_EXTERNAL_SIGNER=OFF
            smoke_test_binaries: true
            # Binary -version smoke is covered by smoke_test_binaries above;
            # the per-job smoke_test command stays focused on the
            # libnaviokernel-specific artifacts unique to this matrix entry.
            smoke_test: |
              test -f ./build/lib/libnaviokernel.so
              file ./build/lib/libnaviokernel.so
              test -x ./build/bin/navio-chainstate

          # Replaces the autotools `i686-centos` matrix entry.
          # Runs inside a CentOS Stream 9 container (quay.io/centos/amd64:stream9)
          # to preserve the distinct coverage the autotools job provided:
          #   - older glibc than Ubuntu 24.04 noble (CentOS Stream 9 ≈ glibc 2.34)
          #   - gcc/g++ from CentOS Stream 9 toolset instead of Ubuntu clang
          #   - rpm/dnf package universe (different from Debian/apt)
          # This faithfully ports the autotools job's container rather than
          # collapsing it into an Ubuntu runner like #234 (i686-multiprocess)
          # did, because the CentOS-glibc/gcc surface is the unique coverage
          # value this job was set up to provide.
          #
          # apt → dnf package mapping:
          #   build-essential cmake ninja-build pkgconf ccache →
          #     gcc-c++ make cmake ninja-build pkgconf-pkg-config ccache
          #   g++-multilib (32-bit ABI) →
          #     glibc-devel.i686 libstdc++-devel.i686  (multilib via gcc native)
          #   python3-zmq → pip3 install pyzmq  (no dnf package)
          #   other tools: git which patch bison perl rsync xz
          #                lbzip2 procps-ng (provides nproc)
          #
          # Autotools CONFIG_SHELL=/bin/dash forced ./configure to run under
          # dash. CMake has no configure script, so there is no shell to
          # override; dash is installed but plays no role in the build.
          #
          # Autotools NO_WERROR=1 suppressed "#warning _FORTIFY_SOURCE > 2 is
          # treated like 2 on this platform [-Werror=cpp]" emitted by CentOS
          # GCC during ./configure. In CMake, the FORTIFY_SOURCE probe inside
          # TryAppendCXXFlags.cmake compiles a small test with -Werror; on
          # CentOS GCC the #warning turns the probe into a compile error, so
          # cxx_supports_fortify_source is set to false and _FORTIFY_SOURCE=3
          # is silently not applied to the actual build. No explicit
          # -Wno-error=cpp flag is needed.
          #
          # depends_opts: CC/CXX use -m32 to produce 32-bit objects from the
          # host gcc/g++ (no multilib cross-compiler package needed on RHEL —
          # the native gcc accepts -m32 when glibc-devel.i686 is present).
          #
          # NB: i686-centos was historically a linux-cmake matrix entry that
          # used GHA's container: directive. It is now its own top-level
          # job (linux-cmake-centos) below because the centos functional
          # tests need:
          #   - --network=host (for working ::1 — GHA's auto-created
          #     github_network_<id> bridge has no IPv6 wired, so [::1]
          #     binds fail; `network: host` is not accepted on
          #     jobs.<id>.container by GHA's workflow schema).
          #   - --cap-add LINUX_IMMUTABLE (for chattr +i in
          #     feature_reindex_readonly.py).
          # Both require manual `docker run` so the centos job runs on a
          # bare ubuntu-24.04 runner and spawns its own container in steps,
          # mirroring autotools' ci/test/02_run_container.sh.

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
      # Match upstream bitcoin/master which sets CCACHE_MAXSIZE=2G as the
      # default across every ci/test/00_setup_env_*.sh env file.
      CCACHE_MAXSIZE: '2G'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          case "${{ matrix.container }}" in
            debian:*|mirror.gcr.io/debian:*)
              # Debian container (mac-cross uses debian:trixie for
              # clang 19). apt-get is the same as Ubuntu, just no sudo
              # — root inside the container. m4 / libtool / autoconf /
              # automake / bison / bzip2 / xz-utils / patch are pulled
              # in because the depends tree's tarballs need them at
              # extract / autoreconf time. The bare ubuntu runner gets
              # them via build-essential's broader transitive set;
              # Debian's build-essential is leaner.
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates git \
                build-essential cmake ninja-build pkgconf ccache curl \
                m4 libtool autoconf automake bison bzip2 xz-utils patch \
                python3 \
                ${{ matrix.packages }}
              ;;
            ?*)
              # Non-empty + non-debian container: assume CentOS/RHEL
              # (the linux-cmake-centos top-level job migrated off the
              # matrix entry pattern in #245, but the historical
              # mac-cross-like path is preserved here in case another
              # entry needs it). Use dnf, no sudo. ninja-build,
              # ccache, and lbzip2 live in EPEL (not in the CentOS
              # Stream 9 base repos), so enable EPEL + CRB first. CRB
              # (CodeReady Builder) provides some EPEL build deps.
              dnf install -y epel-release dnf-plugins-core
              dnf config-manager --set-enabled crb
              # CentOS Stream 9 ships Python 3.9 by default but navio's
              # CMakeLists requires Python 3.10+ for the functional-test
              # runner. Install python3.11 from AppStream and shadow the
              # default /usr/bin/python3 via /usr/local/bin so both
              # cmake find_package(Python3) and the test runner pick
              # it up.
              dnf install -y \
                cmake ninja-build pkgconf-pkg-config ccache \
                python3.11 python3.11-pip python3.11-devel \
                libtool automake autoconf \
                libatomic.i686 libatomic.x86_64 \
                ${{ matrix.packages }}
              ln -sf /usr/bin/python3.11 /usr/local/bin/python3
              ln -sf /usr/bin/pip3.11 /usr/local/bin/pip3
              python3.11 -m pip install --break-system-packages pyzmq 2>/dev/null \
                || python3.11 -m pip install pyzmq
              ;;
            *)
              if [ -n "${{ matrix.extra_arch }}" ]; then
                sudo dpkg --add-architecture ${{ matrix.extra_arch }}
              fi
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                build-essential cmake ninja-build pkgconf ccache \
                ${{ matrix.packages }}
              ;;
          esac

      - name: Set Ccache directory
        run: echo "CCACHE_DIR=${RUNNER_TEMP}/ccache_dir" >> "$GITHUB_ENV"

      - name: Restore Ccache cache
        id: ccache-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ github.job }}-${{ matrix.name }}-ccache-${{ github.run_id }}
          restore-keys: ${{ github.job }}-${{ matrix.name }}-ccache-

      # MSan requires libc++/libc++abi instrumented with -fsanitize=memory so that
      # every memory operation in the C++ standard library is tracked. System libc++
      # is not instrumented. We build from LLVM 17.0.2 source (matching the autotools
      # ci/test/01_base_install.sh USE_MEMORY_SANITIZER block) and cache the result
      # keyed on the LLVM tag so the multi-minute build only happens on cache miss.
      - name: Restore MSan libc++ cache
        if: ${{ matrix.msan }}
        id: msan-libcxx-cache
        uses: actions/cache/restore@v5
        with:
          path: /msan
          key: msan-libcxx-llvmorg-17.0.2-${{ runner.os }}-${{ runner.arch }}

      - name: Build instrumented libc++
        if: ${{ matrix.msan && steps.msan-libcxx-cache.outputs.cache-hit != 'true' }}
        run: |
          sudo mkdir -p /msan && sudo chown "$USER:$USER" /msan
          git clone --depth=1 -b llvmorg-17.0.2 \
            https://github.com/llvm/llvm-project /msan/llvm-project
          cmake -G Ninja -B /msan/cxx_build \
            -DLLVM_ENABLE_RUNTIMES="libcxx;libcxxabi" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_USE_SANITIZER=MemoryWithOrigins \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DLLVM_TARGETS_TO_BUILD=Native \
            -DLLVM_ENABLE_PER_TARGET_RUNTIME_DIR=OFF \
            -DLIBCXX_HARDENING_MODE=debug \
            -S /msan/llvm-project/runtimes
          ninja -C /msan/cxx_build -j"$(nproc)"
          # Remove the source tree post-build so the cache only carries the install.
          rm -rf /msan/llvm-project

      - name: Save MSan libc++ cache
        if: ${{ matrix.msan && steps.msan-libcxx-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: /msan
          key: msan-libcxx-llvmorg-17.0.2-${{ runner.os }}-${{ runner.arch }}

      # Write an absolute-path APPEND_CFLAGS override into a cmake initial-cache
      # file. The static cmake_flags field cannot embed ${{ github.workspace }}
      # because GHA does not re-evaluate context expressions inside matrix scalars.
      # The Configure step passes -C /tmp/msan-cmake-init.cmake when the file exists.
      - name: Set MSan blacklist flag
        if: ${{ matrix.msan }}
        run: |
          # CMake initial-cache syntax: set(VAR "value" CACHE TYPE "" FORCE)
          # APPEND_C/CXXFLAGS must be STRING so cmake --build inherits them.
          # The blacklist flag MUST reach C++ compiles too: src/blsct/ code
          # instantiates MclG1Point/MclScalar etc, which the fun:*mcl*
          # pattern in test/sanitizer_suppressions/msan keeps uninstrumented.
          # Without it on C++ compile, those calls remain instrumented and
          # the uninit shadow leaks out of mcl, surfacing as a false-positive
          # uint256 compare in SigNetParams::SigNetParams (chainparams.cpp).
          #
          # The hardening overrides at the tail (-U_FORTIFY_SOURCE,
          # -fno-stack-protector, -fcf-protection=none, -fno-stack-clash-
          # protection) cancel the unconditional hardening block in navio's
          # root CMakeLists.txt (around line 424). Autotools msan uses
          # --disable-hardening for the same reason: _FORTIFY_SOURCE wraps
          # libc calls in fortified inlines that don't always preserve
          # MSan's shadow propagation, and stack-protector canaries plus
          # cf-protection add code that surfaces MSan false-positives in
          # the prevector allocation path under -O1.
          BLACKLIST="${GITHUB_WORKSPACE}/test/sanitizer_suppressions/msan"
          MSAN_EXTRA="-fsanitize-memory-track-origins=2 -fno-omit-frame-pointer -g -O1 -fno-optimize-sibling-calls -fsanitize-blacklist=${BLACKLIST}"
          HARDEN_OFF="-U_FORTIFY_SOURCE -fno-stack-protector -fcf-protection=none -fno-stack-clash-protection"
          cat > /tmp/msan-cmake-init.cmake <<EOF
          set(APPEND_CFLAGS "${MSAN_EXTRA} ${HARDEN_OFF}" CACHE STRING "" FORCE)
          set(APPEND_CXXFLAGS "${MSAN_EXTRA} ${HARDEN_OFF}" CACHE STRING "" FORCE)
          EOF

      - name: Switch mingw to posix threads
        if: ${{ matrix.depends_host == 'x86_64-w64-mingw32' }}
        run: |
          # ZeroMQ (and several other depends packages) require POSIX-thread
          # mingw-w64 runtime. Ubuntu installs both win32 and posix variants
          # but defaults to win32; flip the alternatives so x86_64-w64-mingw32-gcc
          # resolves to the posix variant.
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Fetch macOS SDK
        if: ${{ matrix.xcode_version }}
        run: |
          # Extract outside depends/ so hashFiles('depends/**') doesn't
          # choke on the SDK's broken-on-Linux symlinks. depends/Makefile
          # honours SDK_PATH, so the build still finds it.
          sdk_basename="Xcode-${{ matrix.xcode_version }}-${{ matrix.xcode_build_id }}-extracted-SDK-with-libcxx-headers"
          sdk_dir="${RUNNER_TEMP}/osx-sdks"
          mkdir -p "$sdk_dir"
          if [ ! -d "$sdk_dir/$sdk_basename" ]; then
            curl --location --fail \
              "https://bitcoincore.org/depends-sources/sdks/${sdk_basename}.tar.gz" \
              -o /tmp/osx-sdk.tar.gz
            tar -C "$sdk_dir" -xf /tmp/osx-sdk.tar.gz
          fi
          echo "SDK_PATH=$sdk_dir" >> "$GITHUB_ENV"

      - name: Restore depends cache
        if: ${{ matrix.depends_host }}
        uses: actions/cache/restore@v5
        with:
          path: depends/${{ matrix.depends_host }}
          key: depends-${{ matrix.depends_host }}-${{ hashFiles('depends/**') }}
          restore-keys: depends-${{ matrix.depends_host }}-

      - name: Build depends
        if: ${{ matrix.depends_host }}
        run: |
          # Strip host CC/CXX so depends derives the target cross-compilers
          # from HOST instead of inheriting the linux-cmake matrix CC/CXX
          # (which would otherwise leak into per-package configure scripts —
          # e.g. zeromq would probe windows.h with the host gcc and fail).
          env -u CC -u CXX make -C depends HOST=${{ matrix.depends_host }} ${{ matrix.depends_opts }}

      - name: Dump depends config.log on failure
        if: failure() && matrix.depends_host
        run: |
          set +e
          for log in depends/work/build/${{ matrix.depends_host }}/*/*/config.log; do
            [ -f "$log" ] || continue
            echo "::group::$log"
            cat "$log"
            echo "::endgroup::"
          done

      - name: Save depends cache
        if: ${{ matrix.depends_host }}
        uses: actions/cache/save@v5
        with:
          path: depends/${{ matrix.depends_host }}
          key: depends-${{ matrix.depends_host }}-${{ hashFiles('depends/**') }}

      - name: Configure
        run: |
          toolchain_arg=""
          if [ -n "${{ matrix.depends_host }}" ]; then
            toolchain_arg="-DCMAKE_TOOLCHAIN_FILE=$PWD/depends/${{ matrix.depends_host }}/toolchain.cmake"
          fi
          # -C passes a cmake initial-cache file; used by msan to inject the
          # absolute-path -fsanitize-blacklist= flag (see "Set MSan blacklist flag").
          init_cache_arg=""
          if [ -f /tmp/msan-cmake-init.cmake ]; then
            init_cache_arg="-C /tmp/msan-cmake-init.cmake"
          fi
          # shellcheck disable=SC2086
          cmake -B build -G Ninja $toolchain_arg $init_cache_arg ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build

      - name: Smoke test binaries
        # Runs `-version` on each built navio binary (or `file` for cross
        # builds with no emulator) to catch load-time failures (rpath,
        # ABI, runtime dep) that ctest can miss since it only execs
        # test_navio. The matrix.win64 entry sets CMAKE_CROSSCOMPILING_EMULATOR
        # so wine is used automatically; mac-cross sets NAVIO_SMOKE_NO_EXEC
        # so the script does a `file` shape probe instead of trying to
        # exec a Mach-O on Linux (where +x is set but the kernel returns
        # ENOEXEC).
        if: ${{ matrix.smoke_test_binaries }}
        env:
          CMAKE_CROSSCOMPILING_EMULATOR: ${{ matrix.depends_host == 'x86_64-w64-mingw32' && '/usr/bin/wine' || '' }}
          NAVIO_SMOKE_NO_EXEC: ${{ contains(matrix.depends_host, 'darwin') && '1' || '' }}
        run: ci/smoke_test_binaries.sh build

      - name: Run unit tests
        if: ${{ matrix.run_unit_tests }}
        working-directory: build
        run: |
          ctest --output-on-failure -j"$(nproc)" \
            ${{ matrix.ctest_exclude && format('-E ''{0}''', matrix.ctest_exclude) || '' }}

      - name: Run functional tests
        if: ${{ matrix.run_functional_tests }}
        # matrix.tmpdirprefix overrides ${RUNNER_TEMP} for entries that need
        # an in-container tmpdir. The i686-centos job runs in a container
        # whose ${RUNNER_TEMP} is a bind mount from the host runner's ext4;
        # chattr +i on bind-mounted files is not honored as expected by
        # feature_reindex_readonly.py, so that job points tmpdirprefix at a
        # native container path (/tmp) where the inode immutability bit
        # behaves consistently.
        # --timeout-factor=40 mirrors TEST_RUNNER_TIMEOUT_FACTOR in the
        # autotools `ci/test/00_setup_env.sh` baseline; slow 32-bit jobs
        # (e.g. blsct_htlc on i686-centos) need it.
        run: |
          TMPDIRPREFIX="${{ matrix.tmpdirprefix }}"
          TMPDIRPREFIX="${TMPDIRPREFIX:-${RUNNER_TEMP}}"
          mkdir -p "${TMPDIRPREFIX}"
          ${{ matrix.functional_tests_env }} \
            build/test/functional/test_runner.py -j"$(nproc)" \
            --ci --quiet --tmpdirprefix="${TMPDIRPREFIX}" \
            --combinedlogslen=99999999 \
            --timeout-factor=40 \
            --exclude mempool_limit

      - name: Install
        if: ${{ matrix.smoke_test }}
        run: DESTDIR="${RUNNER_TEMP}/install" cmake --install build

      - name: Smoke test
        if: ${{ matrix.smoke_test }}
        run: ${{ matrix.smoke_test }}

      - name: Check libblsct symbols
        if: ${{ matrix.check_libblsct_symbols }}
        run: |
          # Artifact paths (CMake BUILD_LIBBLSCT_ONLY=ON):
          #   libblsct.a    → build/lib/libblsct.a          (target: blsct)
          #   libbls384_256 → src/bls/lib/libbls384_256.a   (ExternalProject in-source)
          #   libmcl.a      → src/bls/mcl/lib/libmcl.a      (ExternalProject in-source)
          #   libunivalue   → build/lib/libunivalue.a        (CMake target: univalue)
          #   libsecp256k1  → build/lib/libsecp256k1.a       (subdirectory target)
          python3 contrib/devtools/libblsct-symbol-check.py \
            build/lib/libblsct.a \
            src/bls/lib/libbls384_256.a \
            src/bls/mcl/lib/libmcl.a \
            build/lib/libunivalue.a \
            build/lib/libsecp256k1.a

      - name: Tidy
        if: ${{ matrix.tidy }}
        run: |
          set -eo pipefail
          cmake -B /tmp/tidy-build \
            -DLLVM_DIR=/usr/lib/llvm-17/cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -S contrib/devtools/bitcoin-tidy
          cmake --build /tmp/tidy-build
          cmake --build /tmp/tidy-build --target bitcoin-tidy-tests
          # Filter qt qrc/moc generated files from compile_commands.json in-place
          # so that -p build (directory) works correctly with run-clang-tidy-17.
          # Also drop vendored subtrees (minisketch/leveldb/secp256k1/crc32c/bls):
          # they are not our code and emit compiler warnings (e.g. -Wundef in
          # minisketch's int_utils.h) that the diagnostics gate below would treat
          # as failures. This mirrors the HeaderFilterRegex in src/.clang-tidy,
          # which already excludes those same subtrees.
          jq 'map(select(.file | test("src/qt/qrc_.*\\.cpp$|/moc_.*\\.cpp$|/(minisketch|leveldb|secp256k1|crc32c|bls)/") | not))' \
            build/compile_commands.json > /tmp/compile_commands_filtered.json
          mv /tmp/compile_commands_filtered.json build/compile_commands.json
          # Run clang-tidy, tee output, then explicitly fail if any diagnostic
          # was emitted. The previous `| grep -C5 "error" || [ $? -eq 1 ]`
          # pattern masked real failures: grep exiting 1 (no match) was treated
          # as success, hiding any clang-tidy output without a literal "error".
          run-clang-tidy-17 -quiet \
            -load=/tmp/tidy-build/libbitcoin-tidy.so \
            -p build \
            -j$(nproc) 2>&1 | tee /tmp/tidy.log
          if grep -E "\.(cpp|h|hpp|cc|cxx):[0-9]+:[0-9]+: (error|warning):" /tmp/tidy.log; then
            echo "::error::clang-tidy reported diagnostics"
            exit 1
          fi

      - name: include-what-you-use
        if: ${{ matrix.tidy }}
        run: |
          set -eo pipefail
          # Mirrors the autotools tidy IWYU pass from ci/test/03_test_script.sh.
          # Ubuntu 24.04's iwyu package layout varies by version: iwyu_tool
          # lands on PATH but the include-fixer script may be exposed as
          # `fix_includes`, `fix_includes.py`, or only via
          # /usr/share/include-what-you-use/fix_includes.py. Probe known
          # locations so we fail loudly with a diagnostic listing if none
          # work instead of silently picking up a stale path.
          iwyu_tool_bin=
          for c in iwyu_tool iwyu_tool.py /usr/share/include-what-you-use/iwyu_tool.py; do
            if command -v "$c" >/dev/null 2>&1 || [ -x "$c" ]; then
              iwyu_tool_bin="$c"; break
            fi
          done
          fix_includes_bin=
          for c in fix_include fix_includes fix_include.py fix_includes.py /usr/share/include-what-you-use/fix_includes.py; do
            if command -v "$c" >/dev/null 2>&1 || [ -x "$c" ]; then
              fix_includes_bin="$c"; break
            fi
          done
          if [ -z "$iwyu_tool_bin" ] || [ -z "$fix_includes_bin" ]; then
            echo "::error::Required IWYU tools not found. Package contents:"
            dpkg -L iwyu || true
            exit 1
          fi
          echo "Using iwyu_tool: $iwyu_tool_bin"
          echo "Using fix_includes: $fix_includes_bin"
          "$iwyu_tool_bin" --version || true
          "$fix_includes_bin" --version || true
          "$iwyu_tool_bin" \
            -p build -j"$(nproc)" \
            -- -Xiwyu --cxx17ns \
               -Xiwyu --mapping_file="${PWD}/contrib/devtools/iwyu/bitcoin.core.imp" \
               -Xiwyu --max_line_length=160 \
            2>&1 | tee /tmp/iwyu.log
          ( cd src && "$fix_includes_bin" --nosafe_headers < /tmp/iwyu.log )
          # Match upstream autotools behavior (ci/test/03_test_script.sh):
          # surface the IWYU-suggested diff for visibility but do not fail
          # the job — the codebase has not been cleaned for strict IWYU.
          git --no-pager diff || true

      - name: Fetch qa-assets fuzz corpus
        if: ${{ matrix.fuzz }}
        run: |
          git clone --depth=1 https://github.com/nav-io/qa-assets "${RUNNER_TEMP}/qa-assets"
          echo "DIR_FUZZ_IN=${RUNNER_TEMP}/qa-assets/fuzz_seed_corpus/" >> "$GITHUB_ENV"

      - name: Run fuzz harness
        if: ${{ matrix.fuzz }}
        env:
          LLVM_SYMBOLIZER_PATH: /usr/bin/llvm-symbolizer-17
        run: |
          build/test/fuzz/test_runner.py -j"$(nproc)" -l DEBUG \
            "${DIR_FUZZ_IN}" --empty_min_time=60

      - name: Save Ccache cache
        if: github.event_name != 'pull_request' && steps.ccache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

  # i686-centos lives in its own job because the centos container needs:
  #   1) --network=host  (for working ::1; GHA's auto github_network_<id>
  #      bridge has no IPv6 wired, and `network` is not accepted on
  #      jobs.<id>.container by GHA's workflow schema);
  #   2) --cap-add=LINUX_IMMUTABLE  (for chattr +i in
  #      feature_reindex_readonly.py).
  # Both are only achievable with a manual `docker run` inside an ubuntu
  # runner, mirroring autotools' ci/test/02_run_container.sh.
  linux-cmake-centos:
    name: 'CentOS Stream 9, 32-bit, unit + functional tests (CMake)'
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    env:
      CC: gcc
      CXX: g++
      CCACHE_MAXSIZE: '2G'
      CONTAINER_IMAGE: quay.io/centos/amd64:stream9
      CONTAINER_NAME: navio-ci-centos
      DEPENDS_HOST: i686-pc-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Pull container image
        run: docker pull "${CONTAINER_IMAGE}"

      - name: Start container
        # --network=host: container reuses runner's working IPv6 stack so
        #                 rpc_bind --ipv6 / feature_proxy [::1] tests can
        #                 bind ::1.
        # --cap-add=LINUX_IMMUTABLE: feature_reindex_readonly.py runs
        #                 `chattr +i` on a block file.
        # --tmpfs /tmp/navio_test_runner:exec: the functional test runner
        #                 places per-test scratch dirs here. On docker's
        #                 default overlay2 storage the immutable inode
        #                 attribute from chattr +i is not honored across
        #                 copy-up boundaries, so feature_reindex_readonly
        #                 expects naviod to fail-on-write but naviod runs
        #                 normally and the test times out. tmpfs supports
        #                 the immutable attribute natively; size left at
        #                 docker's default (half of total RAM) which is
        #                 plenty for the test_runner scratch dirs.
        # Mount the workspace and ccache dir bidirectionally so depends/
        # build/ artifacts and the ccache survive across steps as if we
        # were running natively.
        run: |
          mkdir -p "${RUNNER_TEMP}/ccache_dir"
          docker run -d --name "${CONTAINER_NAME}" \
            --network=host \
            --cap-add=LINUX_IMMUTABLE \
            --tmpfs /tmp/navio_test_runner:exec \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            -v "${RUNNER_TEMP}/ccache_dir:${RUNNER_TEMP}/ccache_dir" \
            -w "${GITHUB_WORKSPACE}" \
            -e CCACHE_DIR="${RUNNER_TEMP}/ccache_dir" \
            -e CCACHE_MAXSIZE="${CCACHE_MAXSIZE}" \
            -e CC="${CC}" \
            -e CXX="${CXX}" \
            "${CONTAINER_IMAGE}" \
            tail -f /dev/null

      - name: Install build dependencies (in container)
        run: |
          docker exec "${CONTAINER_NAME}" bash -eu -c '
            # EPEL + CRB needed for ninja-build, ccache, lbzip2 (not in base).
            dnf install -y epel-release dnf-plugins-core
            dnf config-manager --set-enabled crb
            # CentOS Stream 9 ships Python 3.9; navio CMakeLists requires >=3.10.
            # Install python3.11 from AppStream and shadow /usr/bin/python3.
            # e2fsprogs (chattr/lsattr) needed by feature_reindex_readonly.py.
            # centos9 default image ships without it; test framework probes
            # for the chattr binary, falls through silently when missing,
            # leaves undo_immutable as a no-op, and naviod runs unconstrained
            # until --timeout-factor x 60 s elapses.
            dnf install -y \
              cmake ninja-build pkgconf-pkg-config ccache \
              python3.11 python3.11-pip python3.11-devel \
              libtool automake autoconf \
              libatomic.i686 libatomic.x86_64 \
              gcc-c++ glibc-devel.x86_64 libstdc++-devel.x86_64 \
              glibc-devel.i686 libstdc++-devel.i686 \
              git which patch bison perl rsync \
              xz lbzip2 procps-ng make \
              e2fsprogs
            ln -sf /usr/bin/python3.11 /usr/local/bin/python3
            ln -sf /usr/bin/pip3.11 /usr/local/bin/pip3
            python3.11 -m pip install --break-system-packages pyzmq 2>/dev/null \
              || python3.11 -m pip install pyzmq
          '

      - name: Restore Ccache cache
        id: ccache-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.RUNNER_TEMP }}/ccache_dir
          key: ${{ github.job }}-ccache-${{ github.run_id }}
          restore-keys: ${{ github.job }}-ccache-

      - name: Restore depends cache
        uses: actions/cache/restore@v5
        with:
          path: depends/${{ env.DEPENDS_HOST }}
          key: depends-${{ env.DEPENDS_HOST }}-${{ hashFiles('depends/**') }}
          restore-keys: depends-${{ env.DEPENDS_HOST }}-

      - name: Build depends (in container)
        run: |
          docker exec "${CONTAINER_NAME}" bash -eu -c '
            env -u CC -u CXX make -C depends \
              HOST='"${DEPENDS_HOST}"' \
              CC="gcc -m32" CXX="g++ -m32"
          '

      - name: Save depends cache
        uses: actions/cache/save@v5
        with:
          path: depends/${{ env.DEPENDS_HOST }}
          key: depends-${{ env.DEPENDS_HOST }}-${{ hashFiles('depends/**') }}

      - name: Configure (in container)
        # ${GITHUB_WORKSPACE} is a runner-side env var that is not set
        # inside the container; $PWD inside the container resolves to the
        # workspace because docker run was invoked with -w
        # "${GITHUB_WORKSPACE}".
        run: |
          docker exec "${CONTAINER_NAME}" bash -eu -c '
            cmake -B build -G Ninja \
              -DCMAKE_TOOLCHAIN_FILE="$PWD/depends/'"${DEPENDS_HOST}"'/toolchain.cmake" \
              -DCMAKE_BUILD_TYPE=Release \
              -DWITH_ZMQ=ON \
              -DREDUCE_EXPORTS=ON
          '

      - name: Build (in container)
        run: docker exec "${CONTAINER_NAME}" cmake --build build

      - name: Smoke test binaries (in container)
        run: docker exec "${CONTAINER_NAME}" ci/smoke_test_binaries.sh build

      - name: Run unit tests (in container)
        run: |
          docker exec --workdir "${GITHUB_WORKSPACE}/build" "${CONTAINER_NAME}" \
            ctest --output-on-failure -j"$(nproc)"

      - name: Run functional tests (in container)
        # --timeout-factor=80 (doubled from autotools' 40 in
        # ci/test/00_setup_env.sh) — 32-bit naviod block-generation for
        # blsct_unconfirmed_spending overruns the 2400 s budget that
        # factor=40 produces; bump to 4800 s (=80 x 60 s). Other slow
        # blsct_* tests already pass under factor=40.
        # tmpdirprefix points at /tmp inside the container (overlayfs)
        # rather than the bind-mounted workspace, so
        # feature_reindex_readonly's chattr +i lands on a filesystem that
        # honours immutability.
        run: |
          docker exec "${CONTAINER_NAME}" bash -eu -c '
            mkdir -p /tmp/navio_test_runner
            build/test/functional/test_runner.py -j"$(nproc)" \
              --ci --quiet --tmpdirprefix=/tmp/navio_test_runner \
              --combinedlogslen=99999999 \
              --timeout-factor=80 \
              --exclude mempool_limit
          '

      - name: Stop container
        if: always()
        run: |
          docker stop "${CONTAINER_NAME}" || true
          docker rm "${CONTAINER_NAME}" || true

      - name: Save Ccache cache
        if: github.event_name != 'pull_request' && steps.ccache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.RUNNER_TEMP }}/ccache_dir
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

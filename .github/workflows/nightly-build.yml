name: Nightly build artifacts

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build
        required: false
        default: testnet-with-consensus-changes
        type: string

permissions:
  contents: read

jobs:
  nightly-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 720
    env:
      TARGET_BRANCH:
        ${{ github.event_name == 'workflow_dispatch' && inputs.branch ||
        'testnet-with-consensus-changes' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y git gpg unzip zip

      - name: Prepare navio-builder workspace
        run: |
          git clone https://github.com/aguycalled/navio-builder.git /tmp/navio-builder
          sudo mkdir -p /navio
          sudo chown -R "$USER:$USER" /navio
          cp -a /tmp/navio-builder/. /navio/

      - name: Prepare target repository
        run: |
          git clone --origin origin "https://github.com/${{ github.repository }}.git" /navio/navio-core
          cd /navio/navio-core
          git fetch --all --tags
          git checkout -f "origin/${TARGET_BRANCH}"

      - name: Build binaries
        run: |
          perl -0pi -e "s#git checkout -f origin/testnet-with-consensus-changes#git checkout -f origin/$ENV{TARGET_BRANCH}#" /navio/build
          chmod +x /navio/build
          /navio/build

      - name: Upload nightly binaries
        uses: actions/upload-artifact@v4
        with:
          name: nightly-binaries-${{ env.TARGET_BRANCH }}-${{ github.run_number }}
          path: |
            /navio/builds/*.zip
            /navio/builds/*.tar.gz
            /navio/builds/SHA256SUMS-*
            /navio/builds/*.asc
          if-no-files-found: error
          retention-days: 30
